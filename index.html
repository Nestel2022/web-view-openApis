@'
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Data WebView</title>
    <script src="https://appx/web-view.min.js"></script>
    <style>
      :root {
        --bg: #0b1220;
        --card: #111a2e;
        --card-2: #16233d;
        --text: #e6eefc;
        --muted: #9db0d0;
        --ok: #1fbf75;
        --warn: #f59e0b;
        --bad: #f43f5e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, #1c2d52, var(--bg) 45%);
        padding: 16px;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }

      .card {
        background: linear-gradient(180deg, var(--card), var(--card-2));
        border: 1px solid #253a64;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .status {
        font-size: 14px;
        color: var(--muted);
      }

      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .bad { color: var(--bad); }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .item {
        background: #0f1930;
        border: 1px solid #22365e;
        border-radius: 10px;
        padding: 10px;
      }

      .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 3px;
      }

      .value {
        word-break: break-word;
        font-weight: 600;
      }

      .full { grid-column: 1 / -1; }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 240px;
        overflow: auto;
      }

      @media (max-width: 640px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Datos Usuario (Mini Program)</h1>
        <div id="status" class="status warn">Inicializando WebView...</div>
      </section>

      <section class="card">
        <div class="grid">
          <div class="item"><div class="label">hasUserInfo</div><div id="hasUserInfo" class="value">-</div></div>
          <div class="item"><div class="label">userId</div><div id="userId" class="value">-</div></div>
          <div class="item"><div class="label">name</div><div id="name" class="value">-</div></div>
          <div class="item"><div class="label">surname</div><div id="surname" class="value">-</div></div>
          <div class="item"><div class="label">phoneNumber</div><div id="phoneNumber" class="value">-</div></div>
          <div class="item full"><div class="label">email</div><div id="email" class="value">-</div></div>
        </div>
      </section>

      <section class="card">
        <div class="label">Payload Recibido</div>
        <pre id="raw">-</pre>
      </section>
    </main>

    <script>
      const state = {
        received: false,
        attempts: 0,
        maxAttempts: 8,
      };

      function setStatus(text, kind) {
        const el = document.getElementById("status");
        el.textContent = text;
        el.className = "status " + (kind || "warn");
      }

      function setValue(id, value) {
        const el = document.getElementById(id);
        el.textContent = value === undefined || value === null || value === "" ? "-" : String(value);
      }

      function renderUser(user) {
        setValue("hasUserInfo", user.hasUserInfo);
        setValue("userId", user.userId);
        setValue("name", user.name);
        setValue("surname", user.surname);
        setValue("phoneNumber", user.phoneNumber);
        setValue("email", user.email);
      }

      function setRaw(payload) {
        const el = document.getElementById("raw");
        try {
          el.textContent = JSON.stringify(payload, null, 2);
        } catch {
          el.textContent = String(payload);
        }
      }

      function parseIfJsonString(value) {
        if (typeof value !== "string") {
          return value;
        }
        try {
          return JSON.parse(value);
        } catch {
          return value;
        }
      }

      function unwrapPayload(input) {
        let value = input;

        for (let i = 0; i < 6; i += 1) {
          value = parseIfJsonString(value);

          if (Array.isArray(value) && value.length > 0) {
            value = value[0];
            continue;
          }

          if (value && typeof value === "object" && "detail" in value) {
            value = value.detail;
            continue;
          }

          if (value && typeof value === "object" && "data" in value) {
            value = value.data;
            continue;
          }

          break;
        }

        value = parseIfJsonString(value);
        return value;
      }

      function normalizeUserData(anyPayload) {
        const payload = unwrapPayload(anyPayload);

        if (!payload || typeof payload !== "object") {
          return null;
        }

        if (payload.type === "getDataUser") {
          if (payload.success !== true) {
            return { error: payload.error || payload.data || "Respuesta getDataUser sin exito" };
          }
          const nested = unwrapPayload(payload.data);
          if (!nested || typeof nested !== "object") {
            return { error: "Respuesta getDataUser no contiene objeto data valido" };
          }
          return nested;
        }

        if ("userId" in payload || "email" in payload || "phoneNumber" in payload) {
          return payload;
        }

        return null;
      }

      function handleIncoming(raw) {
        const parsed = unwrapPayload(raw);
        setRaw(parsed);

        const result = normalizeUserData(raw);
        if (!result) {
          return;
        }

        if (result.error) {
          setStatus("Mini program respondio error: " + result.error, "bad");
          return;
        }

        state.received = true;
        renderUser(result);
        setStatus("Datos recibidos y pintados correctamente.", "ok");
      }

      function registerOnMessage() {
        if (!globalThis.my) {
          return false;
        }

        if (typeof globalThis.my.onMessage === "function") {
          globalThis.my.onMessage(handleIncoming);
          return true;
        }

        globalThis.my.onMessage = handleIncoming;
        return true;
      }

      function requestGetData() {
        if (!globalThis.my || typeof globalThis.my.postMessage !== "function") {
          setStatus("No se detecta bridge de mini program (my.postMessage).", "bad");
          return;
        }

        state.attempts += 1;

        const message = {
          action: "getData",
          requestId: "req_getdata_" + state.attempts + "_" + Date.now(),
          ts: Date.now(),
        };

        try {
          globalThis.my.postMessage({ data: message });
          setStatus("Solicitando getData (intento " + state.attempts + "/" + state.maxAttempts + ")...", "warn");
        } catch (error) {
          setStatus("Fallo enviando getData: " + (error && error.message ? error.message : String(error)), "bad");
          return;
        }

        setTimeout(function retryIfNeeded() {
          if (!state.received && state.attempts < state.maxAttempts) {
            requestGetData();
            return;
          }

          if (!state.received && state.attempts >= state.maxAttempts) {
            setStatus("No llego respuesta getDataUser luego de " + state.maxAttempts + " intentos.", "bad");
          }
        }, 900);
      }

      function start() {
        renderUser({});

        if (!registerOnMessage()) {
          setStatus("No se detecta objeto my. Abre esta web desde el web-view del mini program.", "bad");
          return;
        }

        requestGetData();
      }

      function onDomReady() {
        setTimeout(start, 120);
      }

      document.addEventListener("DOMContentLoaded", onDomReady);

      if (document.readyState === "complete") {
        setTimeout(start, 120);
      }
    </script>
  </body>
</html>
