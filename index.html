<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo WebView y Minprogram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <script src="https://appx/web-view.min.js"></script>
    <script src="./config.js"></script>
    <script src="./signature.js"></script>
    <script src="./openApis.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="relative isolate overflow-hidden min-h-screen">
      <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_right,_#334155_0%,_#0f172a_45%,_#020617_100%)]"></div>
      <div class="absolute -top-28 -left-24 h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"></div>
      <div class="absolute -bottom-32 -right-20 h-80 w-80 rounded-full bg-blue-600/20 blur-3xl"></div>

      <main class="mx-auto flex min-h-screen max-w-3xl items-center p-4 sm:p-8">
        <section class="w-full rounded-3xl border border-white/10 bg-slate-900/70 p-6 shadow-2xl shadow-blue-950/50 backdrop-blur-xl sm:p-10">
          <p class="text-xs font-semibold uppercase tracking-[0.28em] text-cyan-300">Alipay WebView</p>
          <h2 class="mt-3 text-3xl font-bold leading-tight text-white sm:text-4xl">Demo WebView y Minprogram</h2>
          <p class="mt-3 text-sm text-slate-300">Flujo simplificado para solicitar authCode y consumir OpenAPIs en la vista.</p>

          <div class="mt-6 rounded-2xl border border-cyan-300/20 bg-cyan-400/10 px-4 py-3 text-sm font-medium text-cyan-100" id="status">
            Inicializando entorno de comunicacion...
          </div>

          <div class="mt-6 rounded-2xl border border-white/10 bg-slate-950/60 p-4">
            <p class="text-xs uppercase tracking-widest text-slate-400">AppID</p>
            <p class="mt-2 break-all text-lg font-semibold text-cyan-300" id="appIdLabel">-</p>
          </div>

          <div class="mt-4 rounded-2xl border border-white/10 bg-slate-950/60 p-4">
            <p class="text-xs uppercase tracking-widest text-slate-400">AuthCode</p>
            <p class="mt-2 break-all text-lg font-semibold text-emerald-300" id="authCodeLabel">-</p>
          </div>

          <div class="mt-4 grid gap-4 lg:grid-cols-2">
            <div class="rounded-2xl border border-white/10 bg-slate-950/60 p-4">
              <p class="text-xs uppercase tracking-widest text-slate-400">ApplyToken Request</p>
              <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-all text-xs text-sky-200" id="applyTokenRequestLabel">-</pre>
            </div>

            <div class="rounded-2xl border border-white/10 bg-slate-950/60 p-4">
              <p class="text-xs uppercase tracking-widest text-slate-400">ApplyToken Response</p>
              <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-all text-xs text-emerald-200" id="applyTokenResponseLabel">-</pre>
            </div>

            <div class="rounded-2xl border border-white/10 bg-slate-950/60 p-4">
              <p class="text-xs uppercase tracking-widest text-slate-400">InquiryUserInfo Request</p>
              <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-all text-xs text-amber-200" id="inquiryRequestLabel">-</pre>
            </div>

            <div class="rounded-2xl border border-white/10 bg-slate-950/60 p-4">
              <p class="text-xs uppercase tracking-widest text-slate-400">InquiryUserInfo Response</p>
              <pre class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap break-all text-xs text-fuchsia-200" id="inquiryResponseLabel">-</pre>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      let authCodeSolicitado = false;
      let appIdSolicitado = false;
      let openApiSolicitado = false;

      const fallbackConfig = {
        ENV: "UAT",
        userInfo: "https://superapp-api-test.miniprogramas.claro.com.co/",
        GWPConfig: {
          UAT: {
            clientId: "2025070414560001",

          },
        },
      };

      const openApiDebug = {
        applyTokenRequest: null,
        applyTokenResponse: null,
        inquiryRequest: null,
        inquiryResponse: null,
      };

      // Muestra mensajes de estado al usuario en la parte superior de la pantalla.
      function actualizarEstado(message, type = "info") {
        const statusEl = document.getElementById("status");
        statusEl.innerHTML = message;

        const baseClass =
          "mt-6 rounded-2xl px-4 py-3 text-sm font-medium border";
        const variants = {
          success: "border-emerald-300/30 bg-emerald-400/10 text-emerald-100",
          error: "border-rose-300/30 bg-rose-500/10 text-rose-100",
          info: "border-cyan-300/20 bg-cyan-400/10 text-cyan-100",
        };

        statusEl.className = `${baseClass} ${variants[type] || variants.info}`;
      }

      // Envia una solicitud al mini programa de Alipay usando postMessage.
      function enviarSolicitudAlMiniPrograma(data) {
        if (globalThis.my && typeof globalThis.my.postMessage === "function") {
          try {
            const messageData = { data };
            globalThis.my.postMessage(messageData);
            return true;
          } catch (error) {
            console.error("No fue posible enviar postMessage al mini programa", error);
            return false;
          }
        } else {
          actualizarEstado(
            "Entorno de comunicacion no disponible. Abra esta pagina en WebView del mini programa.",
            "error",
          );
          return false;
        }
      }

      // Registra el listener que recibe respuestas desde el mini programa.
      function configurarEscuchaDeMensajes() {
        if (globalThis.my) {
          globalThis.my.onMessage = function (data) {
            procesarMensajeRecibido(data);
          };
          return true;
        } else {
          return false;
        }
      }

      // Procesa respuestas de appID y autorizacion para actualizar la interfaz.
      function procesarMensajeRecibido(data) {
        const payload = data && data.data ? data.data : data;

        if (!payload || typeof payload !== "object") {
          return;
        }

        if (payload.type === "appId") {
          if (payload.success && payload.appId) {
            actualizarEstado("AppID obtenido correctamente.", "success");
            mostrarAppId(payload.appId);
          } else {
            actualizarEstado(
              `Fallo al obtener appID: ${payload.error || "Error desconocido"}`,
              "error",
            );
          }
          return;
        }

        if (payload.type === "authResponse") {
          if (payload.success && payload.authCode) {
            actualizarEstado("Autorizacion exitosa.", "success");
            mostrarAuthCode(payload.authCode);
            consultarOpenApiUsuario();
          } else {
            actualizarEstado(
              `Fallo de autorizacion: ${payload.error || "Error desconocido"}`,
              "error",
            );
          }
        }
      }

      // Imprime el authCode en la etiqueta visible de la interfaz.
      function mostrarAuthCode(authCode) {
        const authCodeEl = document.getElementById("authCodeLabel");
        authCodeEl.textContent = authCode || "-";
      }

      // Imprime el appID en la etiqueta visible de la interfaz.
      function mostrarAppId(appId) {
        const appIdEl = document.getElementById("appIdLabel");
        appIdEl.textContent = appId || "-";
      }

      function renderJson(elementId, data) {
        const responseEl = document.getElementById(elementId);
        try {
          responseEl.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          console.warn("No fue posible serializar datos de depuracion", error);
          responseEl.textContent = String(data || "-");
        }
      }

      function actualizarPanelesOpenApi() {
        renderJson("applyTokenRequestLabel", openApiDebug.applyTokenRequest || "-");
        renderJson("applyTokenResponseLabel", openApiDebug.applyTokenResponse || "-");
        renderJson("inquiryRequestLabel", openApiDebug.inquiryRequest || "-");
        renderJson("inquiryResponseLabel", openApiDebug.inquiryResponse || "-");
      }

      function getRuntimeConfig() {
        if (globalThis.AppConfig && typeof globalThis.AppConfig.getGWPConfig === "function") {
          return globalThis.AppConfig;
        }

        return {
          ...fallbackConfig,
          getGWPConfig(env) {
            return fallbackConfig.GWPConfig[env] || fallbackConfig.GWPConfig.UAT;
          },
        };
      }

      function ensureSigningSupport() {
        if (!globalThis.KEYUTIL || !globalThis.KJUR || !globalThis.hextob64) {
          throw new Error("jsrsasign no esta disponible en la vista.");
        }
      }

      function ensurePEM(privateKey) {
        if (!privateKey) {
          throw new Error("No hay clave privada disponible para firmar.");
        }

        if (privateKey.includes("BEGIN PRIVATE KEY")) {
          return privateKey;
        }

        return `-----BEGIN PRIVATE KEY-----${privateKey}-----END PRIVATE KEY-----`;
      }

      function signContentInline(content, privateKeyPem) {
        ensureSigningSupport();

        const privateKey = globalThis.KEYUTIL.getKey(privateKeyPem);
        const sig = new globalThis.KJUR.crypto.Signature({ alg: "SHA256withRSA" });
        sig.init(privateKey);
        sig.updateString(content);

        return globalThis.hextob64(sig.sign());
      }

      function signGeneratorInline(data) {
        const config = getRuntimeConfig();
        const envConfig = config.getGWPConfig(config.ENV);
        const requestMap = data.reqMap || {};
        const content = `${data.HTTP_METHOD} ${data.URL}\n${data.CLIENT_ID || envConfig.clientId}.${data.MERCHANT_ID || envConfig.merchantId}.${data.REQUEST_TIME}.${JSON.stringify(requestMap)}`;
        const signed = signContentInline(content, ensurePEM(data.PRIVATE_KEY || envConfig.privateKey));
        return `algorithm=RSA256, keyVersion=0, signature=${signed}`;
      }

      function getMyApi() {
        if (!globalThis.my) {
          throw new Error("No se detecto el objeto my del mini programa.");
        }

        return globalThis.my;
      }

      function requestWithLogsInline(requestConfig) {
        const myApi = getMyApi();

        if (typeof myApi.requestLogs === "function") {
          return myApi.requestLogs(requestConfig);
        }

        if (typeof myApi.request === "function") {
          return new Promise((resolve, reject) => {
            myApi.request({
              ...requestConfig,
              success: resolve,
              fail: reject,
            });
          });
        }

        throw new Error("El entorno no soporta requestLogs ni request.");
      }

      async function getTokensInline() {
        const myApi = getMyApi();

        try {
          const { result } = await myApi.call("MQFetchSelfcareParameters", {});
          return result || {};
        } catch (error) {
          console.warn("No fue posible obtener tokens MQFetchSelfcareParameters", error);
          return {};
        }
      }

      function generateSignatureFormatInline(globaldata, requestGateway, requestTimeGateway, url) {
        return {
          HTTP_METHOD: "POST",
          URL: url,
          CLIENT_ID: globaldata.clientId,
          MERCHANT_ID: globaldata.merchantId,
          REQUEST_TIME: requestTimeGateway,
          PRIVATE_KEY: globaldata.privateKey,
          reqMap: {
            ...requestGateway,
          },
        };
      }

      async function getConfigAccessTokenInline(data) {
        const myApi = getMyApi();
        let authCode;

        try {
          const res = await myApi.getAuthCode({ scopes: ["User_Customer_Info"] });
          authCode = res.authCode;
        } catch (error) {
          console.warn("Fallo User_Customer_Info, se intentara User_Base_Info", error);
          const fallbackRes = await myApi.getAuthCode({ scopes: ["User_Base_Info"] });
          authCode = fallbackRes.authCode;
        }

        const appIdResult = myApi.getAppIdSync();
        const appId = appIdResult.appId || appIdResult;
        const body = {
          appId,
          grantType: "AUTHORIZATION_CODE",
          authClientId: data.clientId,
          authCode,
        };

        const requestTimeGateway = Math.floor(Date.now() / 1000).toString();
        const url = "/miniprogram/api/v2/authorization/applyToken";
        const signatureFormat = generateSignatureFormatInline(data, body, requestTimeGateway, url);
        const signature = signGeneratorInline(signatureFormat);

        return {
          clientId: data.clientId,
          merchantId: data.merchantId,
          signature,
          requestTimeGateway,
          body,
        };
      }

      async function getAccessTokenInline(url, dataService) {
        const data = await getConfigAccessTokenInline(dataService);
        const requestConfig = {
          url: `${url}applyToken`,
          method: "POST",
          data: data.body,
          headers: {
            "Client-Id": data.clientId,
            "Request-Time": data.requestTimeGateway,
            Signature: data.signature,
            "Merchant-id": data.merchantId,
          },
        };

        openApiDebug.applyTokenRequest = requestConfig;
        actualizarPanelesOpenApi();

        const response = await requestWithLogsInline(requestConfig);
        openApiDebug.applyTokenResponse = response;
        actualizarPanelesOpenApi();

        return response;
      }

      async function getConfigInquiryUserInfoInline(url) {
        const runtimeConfig = getRuntimeConfig();
        const data = runtimeConfig.getGWPConfig(runtimeConfig.ENV);
        const myApi = getMyApi();
        const responseAccessToken = await getAccessTokenInline(url, data);
        const appIdResult = myApi.getAppIdSync();
        const appId = appIdResult.appId || appIdResult;

        const body = {
          appId,
          accessToken: responseAccessToken?.data?.accessToken || "",
          authClientId: data.clientId,
        };

        const requestTimeGateway = Math.floor(Date.now() / 1000).toString();
        const urlConfig = "/miniprogram/api/v2/users/inquiryUserBasicInfo";
        const signatureFormat = generateSignatureFormatInline(data, body, requestTimeGateway, urlConfig);
        const signature = signGeneratorInline(signatureFormat);

        return {
          clientId: data.clientId,
          merchantId: data.merchantId,
          signature,
          requestTimeGateway,
          body,
        };
      }

      async function getInquiryUserInfoInline(urlUsers, urlApplyToken) {
        const tokens = await getTokensInline();
        const data = await getConfigInquiryUserInfoInline(urlApplyToken);
        const requestConfig = {
          url: `${urlUsers}inquiryUserBasicInfo`,
          method: "POST",
          data: data.body,
          headers: {
            "Client-Id": data.clientId,
            "Request-Time": data.requestTimeGateway,
            Signature: data.signature,
            "Merchant-id": data.merchantId,
            "X-MC-DEVICE-ID": tokens.device_id || "",
            "X-MC-USER-AGENT": tokens.user_agent || "",
          },
        };

        openApiDebug.inquiryRequest = requestConfig;
        actualizarPanelesOpenApi();

        const response = await requestWithLogsInline(requestConfig);
        openApiDebug.inquiryResponse = response;
        actualizarPanelesOpenApi();

        return response;
      }

      // Ejecuta el consumo de OpenAPIs directamente desde la vista web.
      async function consultarOpenApiUsuario() {
        if (openApiSolicitado) {
          return;
        }

        openApiSolicitado = true;
        actualizarEstado("Consumiendo OpenAPIs desde la vista...", "info");
        actualizarPanelesOpenApi();

        try {
          const runtimeConfig = getRuntimeConfig();
          const baseUrl = runtimeConfig.userInfo;
          const urlApplyToken = `${baseUrl}miniprogram/api/v2/authorization/`;
          const urlUsers = `${baseUrl}miniprogram/api/v2/users/`;

          await getInquiryUserInfoInline(urlUsers, urlApplyToken);
          actualizarEstado("OpenAPI inquiryUserBasicInfo consumida correctamente.", "success");
        } catch (error) {
          openApiDebug.inquiryResponse = {
            error: error?.message || String(error),
            raw: error,
          };
          actualizarPanelesOpenApi();
          actualizarEstado("Fallo al consumir OpenAPIs desde la vista.", "error");
        }
      }

      // Solicita al mini programa el appID.
      function obtenerAppId() {
        if (appIdSolicitado) {
          return;
        }
        appIdSolicitado = true;

        const message = {
          action: "getAppID",
          requestId: "req_appid_" + Date.now(),
          timestamp: new Date().toISOString(),
        };

        if (!enviarSolicitudAlMiniPrograma(message)) {
          actualizarEstado("No fue posible enviar la solicitud de appID.", "error");
        }
      }

      // Solicita al mini programa el permiso auth_base para obtener authCode.
      function obtenerAuthCode() {
        if (authCodeSolicitado) {
          return;
        }
        authCodeSolicitado = true;

        actualizarEstado("Solicitando autorizacion...", "info");

        const message = {
          action: "getAuthCode",
          scopes: ["auth_base"],
          requestId: "req_" + Date.now(),
          timestamp: new Date().toISOString(),
        };

        if (!enviarSolicitudAlMiniPrograma(message)) {
          actualizarEstado("No fue posible enviar la solicitud de authCode.", "error");
        }
      }

      // Verifica entorno Alipay y deja listo el listener para recibir authCode.
      function inicializar() {
        if (globalThis.my && typeof globalThis.my.postMessage === "function") {
          if (configurarEscuchaDeMensajes()) {
            actualizarEstado("Entorno listo para solicitar appID y authCode.", "success");
            obtenerAppId();
            obtenerAuthCode();
          } else {
            actualizarEstado("No fue posible configurar la escucha de mensajes.", "error");
          }
        } else {
          actualizarEstado("No se detecto entorno de mini programa Alipay.", "error");
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(inicializar, 100);
      });

      if (document.readyState === "complete") {
        setTimeout(inicializar, 100);
      }
    </script>
